[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules"]
solc_version = "0.5.10"
optimizer = true
optimizer_runs = 200

test = "forge-test"
script = "script"

remappings = [
    "openzeppelin-solidity/=node_modules/openzeppelin-solidity/"
]

[etherscan]
unichain_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=1301" }
unichain = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=130" }
